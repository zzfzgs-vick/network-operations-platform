name: quality

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - windows-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.5
          cache: false
      - run: npm ci
      - run: go mod verify
      - name: Verify on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: pwsh -NoProfile -File scripts/verify.ps1
      - name: Verify on Ubuntu
        if: runner.os == 'Linux'
        shell: sh
        run: sh scripts/verify.sh
