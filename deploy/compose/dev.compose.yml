name: nop-dev

x-platform-database-environment: &platform-database-environment
  DATABASE_HOST: postgres
  DATABASE_PORT: 5432
  DATABASE_NAME: ${DATABASE_NAME:-network_operations}
  DATABASE_USER: ${DATABASE_USER:-nop}
  DATABASE_PASSWORD: ${DATABASE_PASSWORD:-change-me-local-only}
  DATABASE_SSL_MODE: ${DATABASE_SSL_MODE:-disable}
  DATABASE_POOL_MAX: ${DATABASE_POOL_MAX:-10}
  DATABASE_CONNECT_TIMEOUT_MS: ${DATABASE_CONNECT_TIMEOUT_MS:-5000}
  DATABASE_QUERY_TIMEOUT_MS: ${DATABASE_QUERY_TIMEOUT_MS:-10000}

services:
  postgres:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-network_operations}
      POSTGRES_USER: ${DATABASE_USER:-nop}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-change-me-local-only}
    ports:
      - "127.0.0.1:${DATABASE_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.147.0
    command:
      - -storageDataPath=/victoria-metrics-data
      - -retentionPeriod=90d
    ports:
      - "127.0.0.1:${VICTORIAMETRICS_PORT:-8428}:8428"
    volumes:
      - victoriametrics-data:/victoria-metrics-data
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "-O",
          "/dev/null",
          "http://127.0.0.1:8428/-/healthy",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  vmalert:
    image: victoriametrics/vmalert:v1.147.0
    command:
      - -datasource.url=http://victoriametrics:8428
      - -remoteRead.url=http://victoriametrics:8428
      - -remoteWrite.url=http://victoriametrics:8428
      - -rule=/etc/vmalert/rules/*.yml
      - -httpListenAddr=:8880
    ports:
      - "127.0.0.1:${VMALERT_PORT:-8880}:8880"
    volumes:
      - ../vmalert/rules:/etc/vmalert/rules:ro
    depends_on:
      victoriametrics:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "-O",
          "/dev/null",
          "http://127.0.0.1:8880/-/healthy",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  web:
    profiles: [application]
    build:
      context: ../..
      dockerfile: deploy/docker/web.Dockerfile
    ports:
      - "127.0.0.1:${WEB_PORT:-4173}:4173"

  api:
    profiles: [application]
    build:
      context: ../..
      dockerfile: deploy/docker/platform.Dockerfile
    command: ["node", "apps/platform/dist/main.js"]
    environment:
      <<: *platform-database-environment
      HOST: 0.0.0.0
      PORT: 3000
      VICTORIAMETRICS_URL: http://victoriametrics:8428
      VMALERT_URL: http://vmalert:8880
      PLATFORM_HEALTH_TIMEOUT_MS: ${PLATFORM_HEALTH_TIMEOUT_MS:-2000}
      WORKER_HEARTBEAT_INTERVAL_MS: ${WORKER_HEARTBEAT_INTERVAL_MS:-5000}
      WORKER_HEARTBEAT_STALE_AFTER_MS: ${WORKER_HEARTBEAT_STALE_AFTER_MS:-15000}
      # Loopback/local development placeholders only. Production uses *_FILE.
      COLLECTOR_SERVICE_TOKEN: ${COLLECTOR_SERVICE_TOKEN:-t008-local-development-only-collector-token}
      VMALERT_SERVICE_TOKEN: ${VMALERT_SERVICE_TOKEN:-t008-local-development-only-vmalert-token}
    depends_on:
      postgres:
        condition: service_healthy
      victoriametrics:
        condition: service_healthy
      vmalert:
        condition: service_healthy
    ports:
      - "127.0.0.1:${API_PORT:-3000}:3000"

  worker:
    profiles: [application]
    build:
      context: ../..
      dockerfile: deploy/docker/platform.Dockerfile
    command: ["node", "apps/platform/dist/worker.js"]
    environment:
      <<: *platform-database-environment
      VICTORIAMETRICS_URL: http://victoriametrics:8428
      VMALERT_URL: http://vmalert:8880
      PLATFORM_HEALTH_TIMEOUT_MS: ${PLATFORM_HEALTH_TIMEOUT_MS:-2000}
      WORKER_HEARTBEAT_INTERVAL_MS: ${WORKER_HEARTBEAT_INTERVAL_MS:-5000}
      WORKER_HEARTBEAT_STALE_AFTER_MS: ${WORKER_HEARTBEAT_STALE_AFTER_MS:-15000}
      WORKER_INSTANCE_ID: ${WORKER_INSTANCE_ID:-platform-worker-local}
    depends_on:
      postgres:
        condition: service_healthy

  collector:
    profiles: [application]
    build:
      context: ../..
      dockerfile: deploy/docker/collector.Dockerfile
    environment:
      COLLECTOR_HEALTH_LISTEN_ADDRESS: 0.0.0.0:9090
      COLLECTOR_HEALTH_SHUTDOWN_TIMEOUT_MS: ${COLLECTOR_HEALTH_SHUTDOWN_TIMEOUT_MS:-2000}
      # This identity is distinct from vmalert and is local-development only.
      COLLECTOR_SERVICE_TOKEN: ${COLLECTOR_SERVICE_TOKEN:-t008-local-development-only-collector-token}
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "-O",
          "/dev/null",
          "http://127.0.0.1:9090/health/ready",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

volumes:
  postgres-data:
    name: nop-dev-postgres-data
  victoriametrics-data:
    name: nop-dev-victoriametrics-data

networks:
  default:
    name: nop-dev
